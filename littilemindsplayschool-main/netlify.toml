[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect API calls to serverless functions
[[redirects]]
  from = "/api/students"
  to = "/.netlify/functions/students"
  status = 200

[[redirects]]
  from = "/api/students/*"
  to = "/.netlify/functions/students"
  status = 200

[[redirects]]
  from = "/api/visits"
  to = "/.netlify/functions/visits"
  status = 200

[[redirects]]
  from = "/api/visits/*"
  to = "/.netlify/functions/visits"
  status = 200

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/contact/*"
  to = "/.netlify/functions/contact"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
